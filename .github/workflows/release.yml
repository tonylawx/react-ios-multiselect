name: release

# Publish to npm automatically when a version tag (vX.Y.Z) is pushed.
# Triggered by: `git tag v0.1.0 && git push origin v0.1.0`
#
# Requires the repository secret `NPM_TOKEN` — a npm "granular access token"
# (or classic "Automation" token) with publish permission for this package.
# Automation tokens bypass the account's 2FA, which is exactly what CI needs
# (interactive OTPs don't work in Actions). See CONTRIBUTING.md → Releasing.

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read
  id-token: write  # for npm provenance (npm publish --provenance)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3

      - name: Install
        run: bun install --frozen-lockfile

      - name: Verify package version matches the tag
        # Guard against a tag name that disagrees with package.json — publishing
        # the wrong version is hard to undo.
        run: |
          set -e
          TAG="${GITHUB_REF#refs/tags/v}"
          PKG=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "Tag v$TAG does not match package.json version $PKG"
            exit 1
          fi
          echo "Releasing $PKG"

      - name: Typecheck + test
        run: |
          bun run typecheck
          bun test

      - name: Build
        run: bun run build

      - uses: actions/setup-node@v4
        with:
          registry-url: "https://registry.npmjs.org"
          # NPM_TOKEN must be an Automation/granular token (bypasses 2FA).

      - name: Publish
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
