name: quality

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3

      - name: Install
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Build
        run: bun run build

      - name: Verify zero runtime deps
        # Guard the project's core invariant: no dependencies besides the
        # react/react-dom peers.
        run: |
          set -e
          if bun run --bun node -e "const p=require('./package.json'); const deps=Object.keys(p.dependencies||{}); if(deps.length) { console.error('Unexpected runtime dependencies:', deps); process.exit(1); }"; then
            echo "OK: zero runtime dependencies"
          fi
